services:
  db:
    image: postgres:16
    container_name: orbit_db
    restart: always
    environment:
      POSTGRES_USER: orbit
      POSTGRES_PASSWORD: orbit
      POSTGRES_DB: orbit_dev
    ports:
      - "5432:5432"
    volumes:
      - orbit_data:/var/lib/postgresql/data

volumes:
  orbit_data:
